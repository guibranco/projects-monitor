name: Shell checker

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:

  shell-checker:
    runs-on: ubuntu-latest

    steps:

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Shellcheck
        run: shellcheck **/*.sh
