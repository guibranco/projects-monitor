name: Label based on PR size

on:
  pull_request:
  workflow_dispatch:
  
jobs:
  size-label:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest

    steps:

      - name: size-label
        uses: "pascalgn/size-label-action@56b489b027932ec0cf60438a1a5f1a19c8fc71ff" # v0.5.7
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
